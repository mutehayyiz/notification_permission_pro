name: notification_permission_pro
description: A lightweight, production-ready Flutter package providing unified notification permission state across iOS and Android.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: false
        package: com.example.notification_permission_pro
        pluginClass: NotificationPermissionPro
      ios:
        pluginClass: NotificationPermissionPro
