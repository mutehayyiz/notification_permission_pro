group = 'com.example.notification_permission_pro'
version = '1.0.0'

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.example.notification_permission_pro'
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdk 21
    }
}

dependencies {
    // No additional dependencies needed.
    // Notification APIs and SharedPreferences are provided by the Android SDK.
    // The Flutter embedding (flutter.jar) is added automatically by the Flutter
    // Gradle plugin and supplies FlutterPlugin, MethodChannel, etc.
}
